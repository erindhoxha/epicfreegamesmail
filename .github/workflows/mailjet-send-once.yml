name: Send Mailjet Template Once

on:
  schedule:
    # 10 hours after setup time (UTC): 2026-06-18 18:57 UTC
    - cron: "57 18 18 6 *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-mail:
    runs-on: ubuntu-latest
    env:
      MJ_APIKEY_PUBLIC: ${{ secrets.MJ_APIKEY_PUBLIC }}
      MJ_APIKEY_PRIVATE: ${{ secrets.MJ_APIKEY_PRIVATE }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Skip if not 2026
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$(date -u +%Y)" != "2026" ]]; then
            echo "Not 2026, skipping one-time run."
            exit 0
          fi

      - name: Run mail script
        working-directory: server
        run: node mailjet-send-template.js
